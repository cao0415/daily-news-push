name: Daily News Push (Simple - No API Key)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: python daily_news_simple.py
      env:
        SENDKEY: ${{ secrets.SENDKEY }}
