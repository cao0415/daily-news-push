name: Daily Jobs for Liu Linjie

on:
  schedule:
    # 每天早上9点运行 (UTC时间1点，北京时间+8)
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Run push script for Liu
      env:
        SENDKEY_LIU: ${{ secrets.SENDKEY_LIU }}
      run: |
        python daily_jobs_liu.py
