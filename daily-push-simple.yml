name: Daily News Push (Simple - No API Key)

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00 = 北京时间 8:00
  workflow_dispatch:  # 支持手动触发

jobs:
  push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Run daily news script
      env:
        SENDKEY: ${{ secrets.SENDKEY }}
      run: |
        echo "Current time: $(date)"
        python daily_news_simple.py
        
    - name: Check script result
      if: failure()
      run: |
        echo "Script failed, checking logs..."
        exit 1
